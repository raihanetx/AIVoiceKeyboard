name: Build and Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: app-debug
        path: ./apk

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.5
        name: PixelPro Keyboard v1.0.5
        body: |
          ## PixelPro Keyboard v1.0.5

          ### What's New
          - Fixed keyboard not opening issue
          - Toolbar with 6 buttons (emoji, clipboard, credentials, language, settings, voice)
          - Suggestion bar with 3 word predictions
          - Voice bar with language chip and visualizer
          - QWERTY keyboard layout
          - Caps lock functionality
          - Language swap (English/Bangla)
          - Vibration feedback on key press

          ### Features
          - Android SpeechRecognizer (Offline STT)
          - Groq Whisper API (Online STT)
          - Material Design Light Theme

          ### Installation
          1. Download the APK
          2. Enable "Install from unknown sources"
          3. Install the APK
          4. Go to Settings > System > Languages & input > On-screen keyboard
          5. Enable "AI Voice Keyboard"
          6. Set as default keyboard
        files: ./apk/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
