name: Build and Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get version from build.gradle.kts
      id: get_version
      run: |
        VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*versionName = "\([^"]*\)".*/\1/')
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get version from build.gradle.kts
      id: version
      run: |
        VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*versionName = "\([^"]*\)".*/\1/')
        echo "tag=v$VERSION" >> $GITHUB_OUTPUT

    - name: Download APK
      uses: actions/download-artifact@v4
      with:
        name: app-debug
        path: apk

    - name: List APK files
      run: ls -la apk/

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: AI Voice Keyboard ${{ steps.version.outputs.tag }}
        body: |
          ## 🎤 AI Voice Keyboard v3.4.0
          
          ### ✨ Fixed Voice Section - Now Works Properly!
          - **Radio Button Selection** - Select ONE engine at a time
          - **"Set API Key" Button** - Opens Settings to input key
          - **Selection Persists** - Your choice is saved
          - **Clear Visual Feedback** - Shows which engine is active
          
          ### 🎯 3 STT Engine Options
          - 🟢 **Android (Offline)** - Free, no API key needed
          - 🔵 **Groq (Online)** - Fast & accurate, needs API key
          - 🟣 **Gemini (Live)** - Best quality, needs API key
          
          ### 🔑 How to Use
          1. Select an engine (Android/Groq/Gemini)
          2. If Groq/Gemini: Tap "Set API Key" button
          3. Enter your API key in Settings
          4. Come back and tap 🎤 to speak
          
          ### Get API Keys
          - Groq: https://console.groq.com/keys
          - Gemini: https://aistudio.google.com/apikey
          
          ### 🌐 Translation
          - English ↔ বাংলা translation
          - Powered by GLM-4.7-Flash
        files: apk/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
