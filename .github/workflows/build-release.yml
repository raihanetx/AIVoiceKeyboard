name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get version from build.gradle.kts
      id: get_version
      run: |
        VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*versionName = "\([^"]*\)".*/\1/')
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get version from build.gradle.kts
      id: version
      run: |
        VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*versionName = "\([^"]*\)".*/\1/')
        echo "tag=v$VERSION" >> $GITHUB_OUTPUT

    - name: Download APK
      uses: actions/download-artifact@v4
      with:
        name: app-release
        path: apk

    - name: List APK files
      run: ls -la apk/

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: PixelPro Keyboard ${{ steps.version.outputs.tag }}
        body: |
          ## 🎤 PixelPro Keyboard v3.17.0

          ### ✨ New: PixelPro Keyboard UI

          **Light Theme Design:**
          - Clean, modern light theme
          - Word suggestions with dictionary
          - Next word predictions
          - English & Bangla (Probhat) keyboard layouts

          ### 🎯 2 STT Engines
          - 🟢 **Android (Offline)** - Free, no API key needed
          - 🔵 **Groq (Online)** - Fast & accurate, needs API key

          ### Features
          - Word suggestions
          - Next word predictions
          - Caps lock support
          - Number/Symbol keyboard
          - Voice input with animated visualizer
          - Vibration feedback

          ### How to Use Voice
          1. Tap mic button in toolbar
          2. Select engine (Android or Groq)
          3. For Groq: Enter API key from https://console.groq.com
          4. Tap stop when done speaking
          5. Text is inserted automatically

          ### Get Groq API Key
          - Visit: https://console.groq.com/keys
          - Free tier available
        files: apk/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
