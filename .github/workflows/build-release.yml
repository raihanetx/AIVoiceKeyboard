name: Build and Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get version from build.gradle.kts
      id: get_version
      run: |
        VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*versionName = "\([^"]*\)".*/\1/')
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get version from build.gradle.kts
      id: version
      run: |
        VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*versionName = "\([^"]*\)".*/\1/')
        echo "tag=v$VERSION" >> $GITHUB_OUTPUT

    - name: Download APK
      uses: actions/download-artifact@v4
      with:
        name: app-debug
        path: apk

    - name: List APK files
      run: ls -la apk/

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: AI Voice Keyboard ${{ steps.version.outputs.tag }}
        body: |
          ## 🎤 AI Voice Keyboard v3.2.0
          
          ### 🎯 3 STT Engine Options
          - ✅ **Android (Offline)** - Free, works without internet
          - ✅ **Groq Whisper (Online)** - Fast and accurate
          - ✅ **Gemini 2.5 Flash Live** - Real-time streaming transcription
          
          ### 🔑 API Key Settings
          - Configure Groq API key in Settings
          - Configure Gemini API key in Settings
          - Keys stored securely on device
          
          ### 🌐 Translation
          - English ↔ বাংলা translation
          - Powered by GLM-4.7-Flash
          
          ### How to Use
          1. Download and install APK
          2. Enable keyboard in Android Settings
          3. Open Settings in app to add API keys
          4. Select AI Voice Keyboard as input method
          5. Tap 🎤 to start voice typing!
          
          ### Get API Keys
          - Groq: https://console.groq.com/keys
          - Gemini: https://aistudio.google.com/apikey
        files: apk/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
