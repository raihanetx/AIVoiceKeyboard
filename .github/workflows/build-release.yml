name: Build and Release APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK (Signed with debug key)
      run: ./gradlew assembleDebug --no-daemon

    - name: Rename APK
      run: |
        VERSION=$(grep "versionName" app/build.gradle.kts | sed 's/.*versionName = "\([^"]*\)".*/\1/')
        mv app/build/outputs/apk/debug/*.apk app/build/outputs/apk/debug/PixelProKeyboard-v${VERSION}.apk

    - uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: app-debug
        path: ./apk

    - name: Get version from tag
      id: get_version
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
        else
          VERSION="v1.0.9"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        name: PixelPro Keyboard ${{ steps.get_version.outputs.version }}
        body: |
          ## 🚀 PixelPro Keyboard ${{ steps.get_version.outputs.version }}

          ### 🆕 NEW FEATURES - ALL WORKING!

          #### 😊 Emoji Keyboard
          - 10 categories with 200+ emojis
          - Tap any emoji to insert
          - Easy category switching

          #### 📋 Clipboard Manager
          - View clipboard history
          - Tap to paste any item
          - Long-press to delete
          - Auto-saves copied text

          #### 🔐 Credential Safe
          - Save passwords/credentials securely
          - Tap to insert credentials
          - Long-press to delete
          - Add new credentials easily

          ### ✅ All Toolbar Buttons Now Work!
          - **Emoji** → Opens emoji keyboard
          - **Clipboard** → Opens clipboard manager
          - **Credentials** → Opens credential safe
          - **Language** → Swap EN ↔ বাংলা
          - **Mic** → Voice typing

          ### 🎤 Voice Recognition
          - Android SpeechRecognizer (Offline/Online)
          - Groq Whisper API (Online)

          ### 📲 Installation
          1. Download APK
          2. Enable "Install from unknown sources"
          3. Install APK
          4. Go to Settings > System > Languages & input > On-screen keyboard
          5. Enable "AI Voice Keyboard"
          6. Set as default keyboard
        files: ./apk/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
