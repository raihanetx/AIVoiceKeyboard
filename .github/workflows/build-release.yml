name: Build and Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - uses: android-actions/setup-android@v3
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: app-debug
        path: ./apk
    
    - name: Get version
      id: version
      run: echo "VERSION=v1.0.0-$(date +'%Y%m%d%H%M')" >> $GITHUB_OUTPUT
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.VERSION }}
        name: AI Voice Keyboard ${{ steps.version.outputs.VERSION }}
        body: |
          ## AI Voice Keyboard
          
          ### Features
          - Voice typing with Android Offline
          - Voice typing with Groq AI (Whisper Large V3)
          - English QWERTY keyboard
          - Bangla Probhat keyboard
          - Number & Symbol keyboards
          - Caps Lock support
          - Lightweight APK (~2.5MB)
          
          ### How to Install
          1. Download the APK
          2. Enable "Install from Unknown Sources" in settings
          3. Install the APK
          4. Open the app and enable the keyboard
          5. Select "AI Voice Keyboard" as your input method
        files: ./apk/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
