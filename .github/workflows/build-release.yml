name: Build and Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get version from build.gradle.kts
      id: get_version
      run: |
        VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*versionName = "\([^"]*\)".*/\1/')
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get version from build.gradle.kts
      id: version
      run: |
        VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*versionName = "\([^"]*\)".*/\1/')
        echo "tag=v$VERSION" >> $GITHUB_OUTPUT

    - name: Download APK
      uses: actions/download-artifact@v4
      with:
        name: app-debug
        path: apk

    - name: List APK files
      run: ls -la apk/

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: AI Voice Keyboard ${{ steps.version.outputs.tag }}
        body: |
          ## 🎤 AI Voice Keyboard v3.6.0
          
          ### ✨ Fixed Voice Section Issues
          
          **Better API Key Handling:**
          - Improved API key input field with proper Save button
          - API key status now shows "✓ Ready" when saved
          - Better error messages and feedback
          
          **Improved UI:**
          - Larger, more visible engine cards
          - Clear radio-style selection indicator
          - Better visual feedback for selected engine
          
          **Debug Logging:**
          - Added logging to help diagnose issues
          
          ### 🎯 3 STT Engines
          - 🟢 **Android (Offline)** - Free, no API key needed
          - 🔵 **Groq (Online)** - Fast & accurate, needs API key
          - 🟣 **Gemini (Live)** - Real-time streaming, needs API key
          
          ### How to Use
          1. Tap on an engine card to select
          2. For Groq/Gemini: Enter API key and tap Save
          3. Tap the 🎤 mic button to start recording
          4. Speak and tap mic again to stop
          5. Tap "Insert Text" to use the result
          
          ### Get API Keys
          - Groq: https://console.groq.com/keys
          - Gemini: https://aistudio.google.com/apikey
        files: apk/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
