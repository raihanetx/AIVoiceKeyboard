name: Build APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Create Secrets.kt from GitHub Secret
      run: |
        mkdir -p app/src/main/java/com/aikeyboard
        cat > app/src/main/java/com/aikeyboard/Secrets.kt << 'EOF'
        package com.aikeyboard

        object Secrets {
            const val GROQ_API_KEY = "${{ secrets.GROQ_API_KEY }}"
        }
        EOF
      if: env.GROQ_API_KEY != ''
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    - name: Create default Secrets.kt if not set
      run: |
        if [ ! -f app/src/main/java/com/aikeyboard/Secrets.kt ]; then
          mkdir -p app/src/main/java/com/aikeyboard
          cat > app/src/main/java/com/aikeyboard/Secrets.kt << 'EOF'
          package com.aikeyboard

          object Secrets {
              const val GROQ_API_KEY = ""
          }
          EOF
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
