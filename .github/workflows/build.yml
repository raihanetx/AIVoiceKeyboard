name: Build APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Create Secrets.kt
      run: |
        mkdir -p app/src/main/java/com/aikeyboard/core/security
        echo "package com.aikeyboard.core.security" > app/src/main/java/com/aikeyboard/core/security/Secrets.kt
        echo "" >> app/src/main/java/com/aikeyboard/core/security/Secrets.kt
        echo "/**" >> app/src/main/java/com/aikeyboard/core/security/Secrets.kt
        echo " * API keys and secrets - Auto-generated by GitHub Actions" >> app/src/main/java/com/aikeyboard/core/security/Secrets.kt
        echo " */" >> app/src/main/java/com/aikeyboard/core/security/Secrets.kt
        echo "object Secrets {" >> app/src/main/java/com/aikeyboard/core/security/Secrets.kt
        echo "    const val GROQ_API_KEY: String = \"${{ secrets.GROQ_API_KEY }}\"" >> app/src/main/java/com/aikeyboard/core/security/Secrets.kt
        echo "    const val ZAI_API_KEY: String = \"${{ secrets.ZAI_API_KEY }}\"" >> app/src/main/java/com/aikeyboard/core/security/Secrets.kt
        echo "    fun isGroqApiKeyConfigured(): Boolean = GROQ_API_KEY.isNotBlank()" >> app/src/main/java/com/aikeyboard/core/security/Secrets.kt
        echo "    fun isZaiApiKeyConfigured(): Boolean = ZAI_API_KEY.isNotBlank()" >> app/src/main/java/com/aikeyboard/core/security/Secrets.kt
        echo "}" >> app/src/main/java/com/aikeyboard/core/security/Secrets.kt

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
